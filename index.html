<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skagit County Housing Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg: #f6f7f9; --card: #ffffff; --ink: #1f2937; --muted: #6b7280;
    --accent: #0f766e; --accent-light: #ccfbf1; --drop: #dc2626; --drop-bg: #fee2e2;
    --new-bg: #dbeafe; --new-ink: #1d4ed8; --border: #e5e7eb; --star: #f59e0b;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); }
  header { background: var(--accent); color: #fff; padding: 14px 22px; display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 1.25rem; }
  header .updated { font-size: .8rem; opacity: .85; }
  .stats { display: flex; gap: 22px; padding: 12px 22px; background: var(--card); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .stat b { display: block; font-size: 1.15rem; }
  .stat span { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .controls { display: flex; gap: 10px; padding: 12px 22px; flex-wrap: wrap; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
  .controls label { font-size: .75rem; color: var(--muted); display: block; margin-bottom: 2px; }
  .controls select, .controls input { padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: .85rem; background: #fff; }
  .controls input[type=number] { width: 105px; }
  .tabs { display: flex; gap: 6px; margin-left: auto; }
  .tabs button { padding: 7px 14px; border: 1px solid var(--border); background: #fff; border-radius: 999px; cursor: pointer; font-size: .85rem; }
  .tabs button.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  main { display: grid; grid-template-columns: 1fr 420px; gap: 0; }
  @media (max-width: 1000px) { main { grid-template-columns: 1fr; } #map { display: none; } }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; padding: 16px 22px; align-content: start; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; transition: box-shadow .15s; }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.10); }
  .card .top { padding: 12px 14px 0; display: flex; justify-content: space-between; align-items: start; }
  .price { font-size: 1.25rem; font-weight: 700; }
  .fav { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #d1d5db; line-height: 1; }
  .fav.on { color: var(--star); }
  .badges { padding: 0 14px; display: flex; gap: 6px; flex-wrap: wrap; min-height: 22px; margin-top: 4px; }
  .badge { font-size: .7rem; font-weight: 600; padding: 2px 8px; border-radius: 999px; }
  .badge.drop { background: var(--drop-bg); color: var(--drop); }
  .badge.new { background: var(--new-bg); color: var(--new-ink); }
  .badge.type { background: var(--accent-light); color: var(--accent); }
  .badge.status { background: #f3f4f6; color: var(--muted); }
  .card .body { padding: 8px 14px 12px; font-size: .85rem; color: var(--muted); flex: 1; }
  .card .addr { color: var(--ink); font-weight: 600; margin-bottom: 3px; }
  .facts { display: flex; gap: 10px; margin-top: 6px; font-size: .8rem; }
  .facts b { color: var(--ink); }
  .card a.view { display: block; text-align: center; padding: 8px; background: #f9fafb; border-top: 1px solid var(--border); color: var(--accent); text-decoration: none; font-size: .82rem; font-weight: 600; }
  .card a.view:hover { background: var(--accent-light); }
  .history { font-size: .74rem; margin-top: 6px; color: var(--drop); }
  #map { height: calc(100vh - 60px); position: sticky; top: 60px; }
  .empty { padding: 40px; color: var(--muted); text-align: center; grid-column: 1/-1; }
  .disclaimer { padding: 14px 22px 26px; font-size: .72rem; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>🏠 Skagit County Housing</h1>
  <span class="updated" id="updated"></span>
</header>

<div class="stats" id="stats"></div>

<div class="controls">
  <div><label>City</label><select id="f-city"><option value="">All cities</option></select></div>
  <div><label>Type</label><select id="f-type"><option value="">All types</option></select></div>
  <div><label>Min price</label><input type="number" id="f-min" placeholder="$ min" step="25000"></div>
  <div><label>Max price</label><input type="number" id="f-max" placeholder="$ max" step="25000"></div>
  <div><label>Beds</label><select id="f-beds"><option value="">Any</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
  <div><label>Baths</label><select id="f-baths"><option value="">Any</option><option>1</option><option>2</option><option>3</option></select></div>
  <div><label>Sort</label><select id="f-sort">
    <option value="dom-asc">Newest listed</option>
    <option value="price-asc">Price ↑</option>
    <option value="price-desc">Price ↓</option>
    <option value="drop-desc">Biggest price drop</option>
    <option value="psf-asc">$/sqft ↑</option>
  </select></div>
  <div class="tabs">
    <button data-tab="all" class="on">All</button>
    <button data-tab="drops">Price drops</button>
    <button data-tab="new">New (7d)</button>
    <button data-tab="favs">★ Saved</button>
  </div>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div id="map"></div>
</main>

<p class="disclaimer">Data sourced from publicly visible Redfin search results for personal use; listing data © NWMLS via Redfin. Not affiliated with Redfin or NWMLS. Verify all details on the listing page before making decisions.</p>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let DATA = null, TAB = 'all', MAP = null, MARKERS = null;
const $ = id => document.getElementById(id);
const favs = new Set(JSON.parse(localStorage.getItem('skagit-favs') || '[]'));
const fmt$ = n => n == null ? '—' : '$' + n.toLocaleString();
const daysAgo = iso => Math.round((Date.now() - new Date(iso + 'T12:00')) / 86400000);

async function load() {
  const res = await fetch('data/listings.json');
  DATA = await res.json();
  $('updated').textContent = `Updated ${DATA.updated} · data via Redfin`;
  const cities = [...new Set(DATA.listings.map(l => l.city).filter(Boolean))].sort();
  for (const c of cities) $('f-city').add(new Option(c, c));
  const types = [...new Set(DATA.listings.map(l => l.property_type_label))].sort();
  for (const t of types) $('f-type').add(new Option(t, t));
  MAP = L.map('map').setView([48.42, -122.33], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '© OpenStreetMap' }).addTo(MAP);
  MARKERS = L.layerGroup().addTo(MAP);
  render();
}

function filtered() {
  const city = $('f-city').value, type = $('f-type').value;
  const min = +$('f-min').value || 0, max = +$('f-max').value || Infinity;
  const beds = +$('f-beds').value || 0, baths = +$('f-baths').value || 0;
  let rows = DATA.listings.filter(l =>
    (!city || l.city === city) &&
    (!type || l.property_type_label === type) &&
    (l.price == null || (l.price >= min && l.price <= max)) &&
    (l.price != null || (!min && max === Infinity)) &&
    (l.beds || 0) >= beds && (l.baths || 0) >= baths
  );
  if (TAB === 'drops') rows = rows.filter(l => l.price_drop > 0);
  if (TAB === 'new') rows = rows.filter(isNewListing);
  if (TAB === 'favs') rows = rows.filter(l => favs.has(l.property_id));
  const sort = $('f-sort').value;
  const cmp = {
    'dom-asc':   (a, b) => (a.dom ?? 9e9) - (b.dom ?? 9e9),
    'price-asc': (a, b) => (a.price ?? 9e9) - (b.price ?? 9e9),
    'price-desc':(a, b) => (b.price ?? 0) - (a.price ?? 0),
    'drop-desc': (a, b) => b.price_drop_pct - a.price_drop_pct,
    'psf-asc':   (a, b) => (a.price_per_sqft ?? 9e9) - (b.price_per_sqft ?? 9e9),
  }[sort];
  return rows.sort(cmp);
}

function render() {
  const rows = filtered();
  const medPrice = median(rows.map(l => l.price).filter(Boolean));
  const medPsf = median(rows.map(l => l.price_per_sqft).filter(Boolean));
  const drops = rows.filter(l => l.price_drop > 0).length;
  $('stats').innerHTML = `
    <div class="stat"><b>${rows.length}</b><span>listings shown</span></div>
    <div class="stat"><b>${fmt$(medPrice)}</b><span>median price</span></div>
    <div class="stat"><b>${fmt$(medPsf)}</b><span>median $/sqft</span></div>
    <div class="stat"><b>${drops}</b><span>with price drops</span></div>
    <div class="stat"><b>${favs.size}</b><span>saved</span></div>`;

  $('grid').innerHTML = rows.length ? rows.map(card).join('')
    : '<div class="empty">No listings match these filters.</div>';

  MARKERS.clearLayers();
  for (const l of rows) {
    if (l.lat == null) continue;
    const m = L.circleMarker([l.lat, l.lng], {
      radius: 7, weight: 1.5, color: '#fff', fillOpacity: .95,
      fillColor: l.price_drop > 0 ? '#dc2626' : '#0f766e',
    }).addTo(MARKERS);
    m.bindPopup(`<b>${fmt$(l.price)}</b><br>${esc(l.address ?? '')}, ${esc(l.city ?? '')}<br>` +
      `${l.beds ?? '—'} bd / ${l.baths ?? '—'} ba / ${l.sqft ? l.sqft.toLocaleString() + ' sqft' : '—'}<br>` +
      `<a href="${l.url}" target="_blank" rel="noopener">View on Redfin</a>`);
  }
}

// Prefer Redfin's days-on-market; only fall back to when we first saw it
// (first_seen is meaningless on the database's first day of existence).
const isNewListing = l => l.dom != null ? l.dom <= 7 : daysAgo(l.first_seen) <= 7;

function card(l) {
  const isNew = isNewListing(l);
  const hist = l.price_history.length > 1
    ? `<div class="history">↓ was ${fmt$(l.original_price)} (${l.price_drop_pct}% drop)</div>` : '';
  return `<div class="card">
    <div class="top">
      <span class="price">${fmt$(l.price)}</span>
      <button class="fav ${favs.has(l.property_id) ? 'on' : ''}" onclick="toggleFav(${l.property_id}, this)" title="Save for later">★</button>
    </div>
    <div class="badges">
      ${l.price_drop > 0 ? `<span class="badge drop">▼ ${fmt$(l.price_drop)}</span>` : ''}
      ${isNew ? '<span class="badge new">NEW</span>' : ''}
      <span class="badge type">${l.property_type_label}</span>
      ${l.mls_status && l.mls_status !== 'Active' ? `<span class="badge status">${esc(l.mls_status)}</span>` : ''}
    </div>
    <div class="body">
      <div class="addr">${esc(l.address ?? 'Address withheld')}</div>
      ${esc(l.city ?? '')}, WA ${esc(l.zip ?? '')}
      <div class="facts">
        <span><b>${l.beds ?? '—'}</b> bd</span>
        <span><b>${l.baths ?? '—'}</b> ba</span>
        <span><b>${l.sqft ? l.sqft.toLocaleString() : '—'}</b> sqft</span>
        <span><b>${l.price_per_sqft ? '$' + l.price_per_sqft : '—'}</b>/sqft</span>
      </div>
      <div class="facts">
        <span>Built <b>${l.year_built ?? '—'}</b></span>
        <span><b>${l.dom ?? '—'}</b> days on mkt</span>
        ${l.hoa_month ? `<span>HOA <b>$${l.hoa_month}</b>/mo</span>` : ''}
      </div>
      ${hist}
    </div>
    <a class="view" href="${l.url}" target="_blank" rel="noopener">View on Redfin →</a>
  </div>`;
}

function toggleFav(id, btn) {
  favs.has(id) ? favs.delete(id) : favs.add(id);
  localStorage.setItem('skagit-favs', JSON.stringify([...favs]));
  btn.classList.toggle('on');
  if (TAB === 'favs') render(); else renderStatsOnly();
}
function renderStatsOnly() { render(); }

function median(a) {
  if (!a.length) return null;
  const s = [...a].sort((x, y) => x - y);
  return s.length % 2 ? s[(s.length - 1) / 2] : Math.round((s[s.length / 2 - 1] + s[s.length / 2]) / 2);
}
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

document.querySelectorAll('.tabs button').forEach(b => b.onclick = () => {
  document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('on'));
  b.classList.add('on'); TAB = b.dataset.tab; render();
});
['f-city','f-type','f-min','f-max','f-beds','f-baths','f-sort'].forEach(id => $(id).oninput = render);

load().catch(e => { $('grid').innerHTML = `<div class="empty">Failed to load data: ${esc(e.message)}.<br>Run <code>python fetch_listings.py</code> first, and open this page via a local server.</div>`; });
</script>
</body>
</html>
