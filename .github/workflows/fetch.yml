name: Daily listing fetch

# NOTE: Redfin blocks requests from GitHub-hosted runners (HTTP 405), so
# this cannot run on a schedule here. The daily fetch runs on Connor's PC
# via Windows Task Scheduler and pushes data; this workflow remains for
# manual re-testing in case Redfin's blocking ever changes.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch listings
        run: python fetch_listings.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.db data/listings.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily data update $(date -u +%F)"
            git push
          fi
